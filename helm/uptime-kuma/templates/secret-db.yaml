{{- if and .Values.externalDatabase.enabled (not .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uptime-kuma.fullname" . }}-db
  labels:
    {{- include "uptime-kuma.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ .Values.externalDatabase.password | quote }}
{{- end }}
