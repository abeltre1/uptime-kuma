# Example: reproduce the "Atlas" model-serving status page from seed config.
#
# Each model is its OWN endpoint with its OWN URL. Every monitor is a simple
# HTTP health check (GET <url>, expect 2xx) against that model's unique URL,
# grouped into Other / Endpoints / Embeddings / Cross Encoders on /status/atlas.
#
# >>> Replace every placeholder URL below with the real per-model URL. <<<
# (The hosts here are just slugged guesses so each line is unique and easy to
#  find-and-replace.) Adjust the path if your health endpoint isn't /health,
#  or switch a monitor to type "keyword"/a POST check if a plain GET isn't
#  enough. Add `headers: '{"Authorization": "Bearer ..."}'` if a URL needs auth.
#
# Usage:
#   helm upgrade --install kuma ./helm/uptime-kuma -n monitoring --create-namespace \
#     -f helm/uptime-kuma/examples/atlas-models-values.yaml \
#     --set seed.adminPassword='ChangeMe-Strong!23'

route:
  enabled: true
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

seed:
  enabled: true
  adminUsername: "admin"
  adminPassword: "ChangeMe-Strong!23"   # override: --set seed.adminPassword=...  (or seed.existingAdminSecret)

  # Shared defaults are applied by the seeder; each monitor just needs name + url.
  monitors:
    # --- Other ---
    - name: "Prefect Orchestration Health"
      type: "http"
      url: "https://prefect.apps.mycompany.com/api/health"
      accepted_statuscodes: ["200-299"]
      interval: 60
      maxretries: 2
      retryInterval: 60

    # --- Endpoints (LLMs) — one unique URL each ---
    - { name: "google/gemma-4-31B-it",                     type: http, url: "https://gemma-4-31b-it.apps.mycompany.com/health",            accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "meta-llama/Llama-3.1-8B-Instruct",          type: http, url: "https://llama-3-1-8b-instruct.apps.mycompany.com/health",     accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "meta-llama/Llama-3.2-11B-Vision-Instruct",  type: http, url: "https://llama-3-2-11b-vision.apps.mycompany.com/health",      accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "meta-llama/Llama-3.3-70B-Instruct",         type: http, url: "https://llama-3-3-70b-instruct.apps.mycompany.com/health",    accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "meta-llama/Llama-4-Scout-17B-16E-Instruct", type: http, url: "https://llama-4-scout-17b.apps.mycompany.com/health",         accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "mistral/devstral-2-123B",                   type: http, url: "https://devstral-2-123b.apps.mycompany.com/health",           accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "openai/gpt-oss-120b",                       type: http, url: "https://gpt-oss-120b.apps.mycompany.com/health",              accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }

    # --- Embeddings ---
    - { name: "intfloat/multilingual-e5-large", type: http, url: "https://multilingual-e5-large.apps.mycompany.com/health", accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "intfloat/multilingual-e5-small", type: http, url: "https://multilingual-e5-small.apps.mycompany.com/health", accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "llmrails/ember-v1",              type: http, url: "https://ember-v1.apps.mycompany.com/health",              accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }

    # --- Cross Encoders (rerankers) ---
    - { name: "dev/BAAI/bge-reranker-v2-m3",                type: http, url: "https://bge-reranker-v2-m3.apps.mycompany.com/health",       accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "dev/cross-encoder/ms-marco-MiniLM-L-12-v2",  type: http, url: "https://ms-marco-minilm-l-12-v2.apps.mycompany.com/health",  accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }
    - { name: "dev/cross-encoder/ms-marco-TinyBERT-L-2-V2", type: http, url: "https://ms-marco-tinybert-l-2-v2.apps.mycompany.com/health", accepted_statuscodes: ["200-299"], interval: 60, maxretries: 2 }

  statusPages:
    - slug: "atlas"
      title: "Atlas"
      description: "Model serving status"
      theme: "auto"
      showPoweredBy: true
      # logo: "https://mycompany.com/atlas.png"   # optional brand logo for this page
      groups:
        - name: "Other"
          monitors:
            - "Prefect Orchestration Health"
        - name: "Endpoints"
          monitors:
            - "google/gemma-4-31B-it"
            - "meta-llama/Llama-3.1-8B-Instruct"
            - "meta-llama/Llama-3.2-11B-Vision-Instruct"
            - "meta-llama/Llama-3.3-70B-Instruct"
            - "meta-llama/Llama-4-Scout-17B-16E-Instruct"
            - "mistral/devstral-2-123B"
            - "openai/gpt-oss-120b"
        - name: "Embeddings"
          monitors:
            - "intfloat/multilingual-e5-large"
            - "intfloat/multilingual-e5-small"
            - "llmrails/ember-v1"
        - name: "Cross Encoders"
          monitors:
            - "dev/BAAI/bge-reranker-v2-m3"
            - "dev/cross-encoder/ms-marco-MiniLM-L-12-v2"
            - "dev/cross-encoder/ms-marco-TinyBERT-L-2-V2"
